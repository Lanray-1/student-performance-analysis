<svg width="680" height="700" viewBox="0 0 680 700" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Student Success Analytics Platform architecture</title>
<desc>Data flows from a CSV dataset through SQLite and preprocessing, into model training with MLflow tracking, to committed model artifacts, then to a FastAPI inference service, and finally to a Streamlit dashboard that calls the API.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<style>
text { font-family: -apple-system, "Segoe UI", Arial, sans-serif; }
.th { font-size: 14px; font-weight: 500; }
.ts { font-size: 12px; }
rect { stroke-width: 0.5; }
</style>

<rect x="190" y="40" width="300" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A"/>
<text class="th" x="340" y="60" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">CSV dataset</text>
<text class="ts" x="340" y="78" text-anchor="middle" dominant-baseline="central" fill="#444441">80k records, 35 columns</text>
<line x1="340" y1="96" x2="340" y2="136" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="190" y="136" width="300" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7"/>
<text class="th" x="340" y="156" text-anchor="middle" dominant-baseline="central" fill="#26215C">SQLite + preprocessing</text>
<text class="ts" x="340" y="174" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Leakage removal, feature engineering</text>
<line x1="340" y1="192" x2="340" y2="232" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="190" y="232" width="300" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7"/>
<text class="th" x="340" y="252" text-anchor="middle" dominant-baseline="central" fill="#26215C">Model training</text>
<text class="ts" x="340" y="270" text-anchor="middle" dominant-baseline="central" fill="#3C3489">MLflow tracking, cross-validation, SHAP</text>
<line x1="340" y1="288" x2="340" y2="328" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="190" y="328" width="300" height="56" rx="8" fill="#FAECE7" stroke="#D85A30"/>
<text class="th" x="340" y="348" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">Model artifacts</text>
<text class="ts" x="340" y="366" text-anchor="middle" dominant-baseline="central" fill="#712B13">Committed to git for reproducibility</text>
<line x1="340" y1="384" x2="340" y2="424" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="190" y="424" width="300" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56"/>
<text class="th" x="340" y="444" text-anchor="middle" dominant-baseline="central" fill="#04342C">FastAPI service</text>
<text class="ts" x="340" y="462" text-anchor="middle" dominant-baseline="central" fill="#085041">Containerized inference endpoint</text>
<line x1="340" y1="480" x2="340" y2="520" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="190" y="520" width="300" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56"/>
<text class="th" x="340" y="540" text-anchor="middle" dominant-baseline="central" fill="#04342C">Streamlit dashboard</text>
<text class="ts" x="340" y="558" text-anchor="middle" dominant-baseline="central" fill="#085041">Calls API for live predictions</text>

<text class="ts" x="340" y="610" text-anchor="middle" fill="#444441">Both services are containerized; GitHub Actions runs the test suite and Docker build on every push to main.</text>
</svg>
